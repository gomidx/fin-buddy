<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="coinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD166"/>
      <stop offset="100%" stop-color="#F0A500"/>
    </linearGradient>
  </defs>

  <!-- 
    Logo original: face cx=220 cy=210 r=60, outer ring r=88
    O grupo mais largo vai de x=134 (barras) a x=290 (coin+r=22) = 156px wide
    O grupo mais alto vai de y=131 (coin top) a y=248 (smile bottom) = 117px tall
    Centro do rosto: cx=220, cy=210
    Bounding box com outer ring r=88: x=132..308, y=122..298
    Largura total: 176, Altura total: 176
    Mas coin badge fica em cx=268 cy=153 r=22 => x=246..290, y=131..175
    Barras: x=134..166, y=206..248
    Real bounding: x=132, y=122, w=158, h=176
    Vamos usar padding=6 ao redor do bounding box real
    Translate para encaixar: queremos que x=126 vire x=0 e y=116 vire y=0
    Shift: -126, -116. Escala para caber em 200x200:
    Scale = 188/176 = ~1.068 (mantendo proporcao, usando o maior dim)
    Usar viewBox que contenha tudo sem cortar:
    Elementos extremos no espaço original:
      - anel externo: cx=220 cy=210 r=88 => x:132..308, y:122..298
      - coin: cx=268 cy=153 r=22 => x:246..290, y:131..175
      - barras: x:134..166, y:206..248
    Bounding: x=132, y=122, x2=308, y2=298 => w=176, h=176
    Com padding 10 cada lado: x=122, y=112, w=196, h=196
    Vamos usar esse viewBox com width=196 height=196, mapeado para 200x200
  -->

  <g transform="translate(-122,-112)">

    <!-- Outer glow rings -->
    <circle cx="220" cy="210" r="88" fill="#1D8058" opacity="0.25"/>
    <circle cx="220" cy="210" r="74" fill="#1D8058" opacity="0.35"/>

    <!-- Face base -->
    <circle cx="220" cy="210" r="60" fill="#1D8058"/>

    <!-- Eyebrows -->
    <path d="M197 190 Q205 185 213 190" fill="none" stroke="#4DD99B" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M227 190 Q235 185 243 190" fill="none" stroke="#4DD99B" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Eyes -->
    <circle cx="205" cy="200" r="5" fill="#4DD99B"/>
    <circle cx="235" cy="200" r="5" fill="#4DD99B"/>

    <!-- Smile -->
    <path d="M198 228 Q220 248 242 228" fill="none" stroke="#4DD99B" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Coin badge -->
    <circle cx="268" cy="153" r="22" fill="url(#coinGrad)"/>
    <circle cx="268" cy="153" r="16" fill="none" stroke="#F0A500" stroke-width="1.5"/>
    <text x="268" y="159" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-size="16" font-weight="900" fill="#7A4800">$</text>

    <!-- Bar chart -->
    <rect x="134" y="228" width="8" height="20" rx="2" fill="#4DD99B" opacity="0.5"/>
    <rect x="146" y="218" width="8" height="30" rx="2" fill="#4DD99B" opacity="0.7"/>
    <rect x="158" y="206" width="8" height="42" rx="2" fill="#4DD99B"/>

  </g>
</svg>
